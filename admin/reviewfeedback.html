<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Feedbacks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        async function fetchFeedbacks() {
            const response = await fetch('/feedbacks');
            const feedbacks = await response.json();
            const tableBody = document.getElementById('feedbackTableBody');
            tableBody.innerHTML = '';

            feedbacks.forEach(feedback => {
                const row = `
                    <tr>
                        <td>${feedback.feedback_id}</td>
                        <td>${feedback.customer_id}</td>
                        <td>${feedback.customer_name}</td>
                        <td>${feedback.customer_email}</td>
                        <td>${feedback.feedback}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        document.addEventListener("DOMContentLoaded", fetchFeedbacks);

    </script>
</head>
<body class="container mt-4">
    <h2>Review Feedbacks</h2>
    <table class="table table-bordered mt-3">
        <thead>
            <tr>
                <th>Feedback ID</th>
                <th>Customer ID</th>
                <th>Customer Name</th>
                <th>Customer Email</th>
                <th>Feedback</th>
            </tr>
        </thead>
        <tbody id="feedbackTableBody">
            <!-- Feedbacks will be loaded here dynamically -->
        </tbody>
    </table>
</body>
</html>

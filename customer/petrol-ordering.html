<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Ordering</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            padding-top: 50px;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .petrol-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
        }

        input:focus,
        textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #45a049;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .stock-indicator {
            margin-left: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .stock-available {
            background-color: #28a745;
            color: white;
        }

        .stock-out {
            background-color: #dc3545;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Petrol Ordering</h1>

        <!-- Petrol Ordering Form -->
        <div class="petrol-section">
            <form id="orderForm">
                <label>Select Petrol Type</label>

                <div class="form-check">
                    <input class="form-check-input" type="radio" id="ron95" name="petrol-type" value="Ron 95">
                    <label class="form-check-label" for="ron95">Ron 95</label>
                    <span id="stock-ron95" class="stock-indicator">Loading...</span>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" id="ron97" name="petrol-type" value="Ron 97">
                    <label class="form-check-label" for="ron97">Ron 97</label>
                    <span id="stock-ron97" class="stock-indicator">Loading...</span>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" id="diesel" name="petrol-type" value="Diesel">
                    <label class="form-check-label" for="diesel">Diesel</label>
                    <span id="stock-diesel" class="stock-indicator">Loading...</span>
                </div>

                <label for="amount">Enter the amount of petrol wanted (Litre):</label>
                <input type="number" id="amount" name="amount" placeholder="Example: 50" min="0" required>

                <label for="location">Delivery Location:</label>
                <textarea id="location" name="location" rows="4" placeholder="Enter your delivery address"
                    required></textarea>

                <button type="submit">Place Order</button>
            </form>
        </div>
    </div>

    <script>
        // Example stock data from another page (can be fetched from API)
        const stockData = {
            "Ron 95": 50,  // Available
            "Ron 97": 100, // Available
            "Diesel": 100  // Available
        };

        // Function to update stock indicators
        function updateStockIndicators() {
            Object.keys(stockData).forEach(petrolType => {
                const stock = stockData[petrolType];
                const stockElement = document.getElementById(`stock-${petrolType.toLowerCase().replace(" ", "")}`);
                const radioButton = document.getElementById(petrolType.toLowerCase().replace(" ", ""));

                if (stock > 0) {
                    stockElement.textContent = "Available";
                    stockElement.className = "stock-indicator stock-available";
                } else {
                    stockElement.textContent = "Out of Stock";
                    stockElement.className = "stock-indicator stock-out";
                    radioButton.disabled = true;
                }
            });
        }

        // Call the function to update stock indicators
        updateStockIndicators();

        // Handle form submission
        document.getElementById('orderForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const selectedPetrolType = document.querySelector('input[name="petrol-type"]:checked');
    if (!selectedPetrolType) {
        alert("Please select a petrol type.");
        return;
    }

    const petrolType = selectedPetrolType.value;
    const amount = parseFloat(document.getElementById('amount').value);
    const location = document.getElementById('location').value;

    // Validate amount
    if (isNaN(amount) || amount <= 0) {
        alert("Please enter a valid amount of petrol.");
        return;
    }

    // Petrol price mapping (should match backend)
    const petrolPrices = {
        'Ron 95': 2.05,
        'Ron 97': 2.50,
        'Diesel': 1.80
    };

    // Calculate price
    const price = (petrolPrices[petrolType] * amount).toFixed(2);

    const orderData = {
        petrol_type: petrolType,
        quantity: amount,
        delivery_address: location,
        price: price  // Send price in request body
    };

    try {
        const response = await fetch('/petrol-ordering', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(orderData)
        });

        if (!response.ok) {
            const errorMessage = await response.text();
            throw new Error(errorMessage);
        }

        // Redirect with price included
        window.location.href = `/orderconfirmation?petrol_type=${encodeURIComponent(petrolType)}&quantity=${encodeURIComponent(amount)}&delivery_address=${encodeURIComponent(location)}&price=${encodeURIComponent(price)}`;

    } catch (error) {
        console.error("Fetch error:", error);
        alert('Order submission failed: ' + error.message);
    }
});

async function updatePetrolAvailability() {
    try {
        const response = await fetch('/api/stock');
        const stockData = await response.json();

        Object.keys(stockData).forEach(petrolType => {
            const stock = stockData[petrolType];
            const stockElement = document.getElementById(`stock-${petrolType.toLowerCase().replace(" ", "")}`);
            const radioButton = document.getElementById(petrolType.toLowerCase().replace(" ", ""));

            if (stock.availability === 'Yes' && stock.stock_left > 0) {
                stockElement.textContent = `Available. Stock amount left: ${stock.stock_left} Litres`;
                stockElement.className = "stock-indicator stock-available";
                radioButton.disabled = false;
            } else {
                stockElement.textContent = "Unavailable";
                stockElement.className = "stock-indicator stock-out";
                radioButton.disabled = true;
            }
        });
    } catch (error) {
        console.error("Failed to update petrol availability:", error);
    }
}



updatePetrolAvailability();




    </script>
</body>

</html>

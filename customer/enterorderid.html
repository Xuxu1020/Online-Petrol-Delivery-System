<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Order ID</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }

        .form-control {
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-align: center;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-primary {
            background: #4CAF50;
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: #45a049;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Track Your Order</h1>
        <form id="orderForm" action="/delivery-status" method="GET" onsubmit="handleFormSubmit(event)">
            <div class="mb-3">
                <input type="text" class="form-control form-control-lg" id="orderId" name="orderId"
                    placeholder="Enter Order ID" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Check Status</button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleFormSubmit(event) {
            event.preventDefault();
            const orderId = document.getElementById('orderId').value;
            console.log('Order ID submitted:', orderId);
            window.location.href = `/delivery-status?orderId=${orderId}`;
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .order-details {
            text-align: left;
            font-size: 1.2rem;
            margin-top: 1.5rem;
        }
        .order-details p {
            margin-bottom: 10px;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            margin: 5px;
        }
        .btn-proceed {
            background: #28a745;
            color: #fff;
        }
        .btn-proceed:hover {
            background: #218838;
        }
        .btn-cancel {
            background: #dc3545;
            color: #fff;
        }
        .btn-cancel:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Order Confirmation</h1>
        <div class="order-details">
            <p><strong>Petrol Type:</strong> <span id="petrol_type"></span></p>
            <p><strong>Amount (Litre):</strong> <span id="quantity"></span></p>
            <p><strong>Delivery Location:</strong> <span id="delivery_address"></span></p>
            <p><strong>Total Price (RM):</strong> RM <span id="price"></span></p>
        </div>
        <div class="btn-container">
            <a href="ordersuccess" class="btn btn-proceed">Pay</a>
            <a href="petrol-ordering" class="btn btn-cancel">Cancel</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Petrol prices (same as backend)
            const petrolPrices = {
                'Ron 95': 2.05,
                'Ron 97': 2.50,
                'Diesel': 1.80
            };

            // Function to get query parameters from URL
            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param) || "Not specified";
            }

            // Get values from URL parameters
            const petrolType = getQueryParam('petrol_type');
            const quantity = parseFloat(getQueryParam('quantity')) || 0;
            const deliveryAddress = getQueryParam('delivery_address');

            // Calculate price if valid petrol type and quantity
            let totalPrice = "N/A";
            if (petrolPrices[petrolType] && quantity > 0) {
                totalPrice = (petrolPrices[petrolType] * quantity).toFixed(2);
            }

            // Set values in HTML
            document.getElementById('petrol_type').textContent = petrolType;
            document.getElementById('quantity').textContent = quantity;
            document.getElementById('delivery_address').textContent = deliveryAddress;
            document.getElementById('price').textContent = totalPrice;
        });
    </script>
</body>
</html>

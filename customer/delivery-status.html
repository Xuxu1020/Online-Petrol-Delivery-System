<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Status</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .status-section p {
            font-size: 16px;
            margin-bottom: 8px;
        }
        .loading {
            font-size: 16px;
            color: #007bff;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
            color: white;
        }
        .pending { background-color: orange; }
        .confirmed { background-color: blue; }
        .processing { background-color: purple; }
        .delivered { background-color: green; }
        .cancelled { background-color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delivery Status</h1>

        <div class="status-section">
            <p><strong>Order ID:</strong> <span id="order-id" class="loading">Loading...</span></p>
            <p><strong>Petrol Type:</strong> <span id="petrol-type" class="loading">Loading...</span></p>
            <p><strong>Amount:</strong> <span id="quantity" class="loading">Loading...</span></p>
            <p><strong>Delivery Location:</strong> <span id="delivery-location" class="loading">Loading...</span></p>
            <!-- <p><strong>Estimated Arrival:</strong> <span id="eta" class="loading">Loading...</span></p> -->
            <p><strong>Status:</strong> <span id="status" class="loading">Loading...</span></p>
        </div>
    </div>

    <script>
        // Function to get query parameter from URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Get Order ID from URL
        const orderId = getQueryParam('orderId');

        if (orderId) {
            fetch(`/api/delivery-status?orderId=${orderId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('order-id').textContent = `#${data.orderId}`;
                        document.getElementById('petrol-type').textContent = data.petrolType;
                        document.getElementById('quantity').textContent = `${data.quantity} Litres`;
                        document.getElementById('delivery-location').textContent = data.deliveryAddress;
                        // document.getElementById('eta').textContent = data.estimatedArrival || 'Not Assigned';

                        // Display order status with color coding
                        const statusElement = document.getElementById('status');
                        statusElement.textContent = data.status;
                        statusElement.classList.remove('loading');
                        statusElement.classList.add('status-badge');

                        switch (data.status.toLowerCase()) {
                            case 'pending': statusElement.classList.add('pending'); break;
                            case 'confirmed': statusElement.classList.add('confirmed'); break;
                            case 'processing': statusElement.classList.add('processing'); break;
                            case 'delivered': statusElement.classList.add('delivered'); break;
                            case 'cancelled': statusElement.classList.add('cancelled'); break;
                            default: statusElement.classList.add('pending'); // Default style
                        }
                    } else {
                        document.querySelector('.status-section').innerHTML = `<p class="text-danger">${data.message}</p>`;
                    }
                })
                .catch(error => {
                    console.error('Error fetching order details:', error);
                    document.querySelector('.status-section').innerHTML = '<p class="text-danger">Error fetching order details.</p>';
                });
        } else {
            document.querySelector('.status-section').innerHTML = '<p class="text-warning">Order ID is missing.</p>';
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

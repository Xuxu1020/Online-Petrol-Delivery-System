<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .order-id {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffdd57;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            width: 80%;
            color: #fff;
        }
        .btn-home {
            background: #28a745;
        }
        .btn-home:hover {
            background: #218838;
        }
        .btn-dashboard {
            background: #007bff;
        }
        .btn-dashboard:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Order Successful!</h1>
        <p>Your order has been placed successfully. Thank you for choosing our service.</p>
        <p>Order ID: <span id="order-id" class="order-id">Loading...</span></p>

        <div class="btn-container">
            <a href="/petrol-ordering" class="btn btn-home">Place Another Order</a>
            <a href="/dashboard" class="btn btn-dashboard">Back to Dashboard</a>
        </div>
    </div>

    <script>
        async function fetchOrderId() {
            try {
                const response = await fetch('/api/latest-order');
                const data = await response.json();

                if (data.order_id) {
                    document.getElementById('order-id').innerText = data.order_id;
                } else {
                    document.getElementById('order-id').innerText = "Unavailable";
                }
            } catch (error) {
                console.error("Error fetching order ID:", error);
                document.getElementById('order-id').innerText = "Unavailable";
            }
        }

        fetchOrderId();
    </script>
</body>
</html>

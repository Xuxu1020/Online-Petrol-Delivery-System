<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support / Feedback</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-body {
            padding: 2rem;
        }
        .form-label {
            font-weight: 500;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 0.75rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            color: #fff;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .btn-primary {
            background: #4CAF50;
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
            text-align: center;
        }
        .contact-info {
            text-align: center;
            font-size: 1.2rem;
        }
        .contact-info p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Support / Feedback</h1>

        <div class="row">
            <!-- Feedback Form -->
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <div class="icon">
                            <i class="fas fa-comment-dots"></i> <!-- Feedback icon -->
                        </div>
                        <form id="contactForm">
                            <div class="mb-3">
                                <label for="message" class="form-label">Your Feedback:</label>
                                <textarea class="form-control form-control-lg" id="message" name="message" rows="5" placeholder="Enter your feedback..." required></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Contact Information -->
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body text-center contact-info">
                        <h3><i class="fas fa-phone-alt"></i> Hotline</h3>
                        <p><strong>+012 345 6789</strong></p>

                        <h3><i class="fas fa-envelope"></i> Email</h3>
                        <p><strong>bryanpetrol@support.com</strong></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript for Handling Form Submission -->
    <script>
        document.getElementById("contactForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const feedback = document.getElementById("message").value;
            

            try {
                const response = await fetch("/submit-feedback", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ feedback }),
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = "feedbacksuccess"; // Redirect on success
                } else {
                    alert("Error submitting feedback: " + result.error);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while submitting feedback.");
            }
        });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<body>

        <!-- Main Content -->
        <div class="main-content">
            <header>
                <h1>Customer, Welcome back!</h1>

            <section class="delivery-status">
                <h2>Delivery Status</h2>
                <label for="orderId">Enter Order ID:</label>
                <textarea id="orderId" placeholder="Type here"></textarea>
                <button onclick="checkDelivery()">Enter</button>
            </section>
        </div>
    </div>

    <script>
        function checkDelivery() {
            const orderId = document.getElementById("orderId").value.trim();
            if (orderId) {
                window.location.href = `customershowdeliverystatus.html?orderId=${encodeURIComponent(orderId)}`;
                // alert("Checking status for Order ID: " + orderId);
                // You can redirect or fetch order details dynamically
            } else {
                alert("Please enter an Order ID.");
            }
        }
    </script>

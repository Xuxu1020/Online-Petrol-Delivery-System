<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Delivered Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4 text-center">Past Delivered Orders</h1>
        <table class="table table-bordered table-hover">
            <thead class="table-dark text-center">
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Petrol Type</th>
                    <th>Quantity</th>
                    <th>Delivery Address</th>
                    <th>Delivery Date</th>
                </tr>
            </thead>
            <tbody id="order-list">
                <tr><td colspan="6" class="text-center">Loading past orders...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", fetchPastOrders);

        function fetchPastOrders() {
            fetch('/api/get-delivered-orders')
                .then(response => response.json())
                .then(data => {
                    const orderList = document.getElementById('order-list');
                    orderList.innerHTML = '';

                    if (data.length === 0) {
                        orderList.innerHTML = '<tr><td colspan="6" class="text-center">No past orders found.</td></tr>';
                        return;
                    }

                    data.forEach(order => {
                        const deliveryDate = order.updated_at 
                            ? new Date(order.updated_at).toLocaleString('en-MY', { timeZone: 'Asia/Kuala_Lumpur' }) 
                            : "N/A";

                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="text-center">#${order.id}</td>
                            <td class="text-center">${order.customer_username}</td>
                            <td class="text-center">${order.petrol_type}</td>
                            <td class="text-center">${order.quantity} Litres</td>
                            <td>${order.delivery_address}</td>
                            <td class="text-center">${deliveryDate}</td>
                        `;
                        orderList.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error fetching past orders:', error);
                    document.getElementById('order-list').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error loading past orders.</td></tr>';
                });
        }
    </script>
</body>
</html>

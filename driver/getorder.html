<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Available Orders</h1>
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Petrol Type</th>
                    <th>Quantity</th>
                    <th>Delivery Address</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="order-list">
                <tr><td colspan="7" class="text-center">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", fetchOrders);

        function fetchOrders() {
            fetch('/api/get-orders')
                .then(response => response.json())
                .then(data => {
                    const orderList = document.getElementById('order-list');
                    orderList.innerHTML = '';

                    if (data.length === 0) {
                        orderList.innerHTML = '<tr><td colspan="7" class="text-center">No available orders.</td></tr>';
                        return;
                    }

                    data.forEach(order => {
                        const row = document.createElement('tr');
                        row.id = `order-row-${order.id}`;

                        row.innerHTML = `
                            <td>#${order.id}</td>
                            <td>${order.customer_username}</td>
                            <td>${order.petrol_type}</td>
                            <td>${order.quantity} Litres</td>
                            <td>${order.delivery_address}</td>
                            <td id="status-${order.id}">${order.status}</td>
                            <td id="action-${order.id}">
                                ${order.status === "Pending" ? `
                                    <button class="btn btn-primary btn-sm" onclick="acceptOrder(${order.id})">Accept</button>
                                ` : `
                                    <button class="btn btn-success btn-sm" onclick="updateOrderStatus(${order.id}, 'Delivered')">Delivered</button>
                                    <button class="btn btn-danger btn-sm" onclick="updateOrderStatus(${order.id}, 'Cancelled')">Cancel</button>
                                `}
                            </td>
                        `;
                        orderList.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error fetching orders:', error);
                    document.getElementById('order-list').innerHTML = '<tr><td colspan="7" class="text-center text-danger">Error loading orders.</td></tr>';
                });
        }

        function acceptOrder(orderId) {
            fetch('/api/update-order-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderId, newStatus: 'Confirmed' })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById(`status-${orderId}`).textContent = 'Confirmed';
                    document.getElementById(`action-${orderId}`).innerHTML = `
                        <button class="btn btn-success btn-sm" onclick="updateOrderStatus(${orderId}, 'Delivered')">Delivered</button>
                        <button class="btn btn-danger btn-sm" onclick="updateOrderStatus(${orderId}, 'Cancelled')">Cancel</button>
                    `;
                } else {
                    alert(`Failed to update status: ${data.error}`);
                }
            })
            .catch(error => {
                console.error('Error updating order status:', error);
                alert('Error updating order status.');
            });
        }

        function updateOrderStatus(orderId, newStatus) {
            fetch('/api/update-driver-order-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderId, newStatus })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (newStatus === 'Delivered') {
                        document.getElementById(`order-row-${orderId}`).remove(); // Remove from page
                    } else {
                        document.getElementById(`status-${orderId}`).textContent = 'Pending';
                        document.getElementById(`action-${orderId}`).innerHTML = `
                            <button class="btn btn-primary btn-sm" onclick="acceptOrder(${orderId})">Accept</button>
                        `;
                    }
                } else {
                    alert(`Failed to update status: ${data.error}`);
                }
            })
            .catch(error => {
                console.error('Error updating order status:', error);
                alert('Error updating order status.');
            });
        }
    </script>
</body>
</html>

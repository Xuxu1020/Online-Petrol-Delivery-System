<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            padding-top: 50px;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .card-body {
            padding: 2rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .card-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .cursor-pointer {
            cursor: pointer;
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Driver, Welcome back!</h1>

        <!-- Options Section -->
        <div class="row justify-content-center">
            <!-- Petrol Ordering Card -->
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card shadow h-100 text-center cursor-pointer" onclick="window.location.href='/getorder'">
                    <div class="card-body">
                        <div class="icon">
                            <i class="fas fa-gas-pump"></i>
                        </div>
                        <h2 class="card-title">Check Available Orders</h2>
                        <p class="card-text">Accept and deliver any pending orders.</p>
                    </div>
                </div>
            </div>

            <!-- Delivery Status Card -->
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card shadow h-100 text-center cursor-pointer" onclick="window.location.href='/pastorders'">
                    <div class="card-body">
                        <div class="icon">
                            <i class="fas fa-truck-moving"></i>
                        </div>
                        <h2 class="card-title">View Past Orders</h2>
                        <p class="card-text">View past delivered orders.</p>
                    </div>
                </div>
            </div>

        
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>

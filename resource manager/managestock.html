<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Stock</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            padding-top: 50px;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .stock-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #45a049;
        }

        .form-check {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .form-check-label {
            margin-left: 10px;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Manage Stock</h1>

        <!-- Manage Stock Form -->
        <div class="stock-section">
            <form id="manageStockForm">
                <div class="mb-3">
                    <label for="ron95Stock">Ron 95 Stock:</label>
                    <input type="number" id="ron95Stock" class="form-control" placeholder="Enter stock amount" min="0">
                </div>
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="ron95Availability">
                    <label class="form-check-label" for="ron95Availability">Available</label>
                </div>

                <div class="mb-3">
                    <label for="ron97Stock">Ron 97 Stock:</label>
                    <input type="number" id="ron97Stock" class="form-control" placeholder="Enter stock amount" min="0">
                </div>
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="ron97Availability">
                    <label class="form-check-label" for="ron97Availability">Available</label>
                </div>

                <div class="mb-3">
                    <label for="dieselStock">Diesel Stock:</label>
                    <input type="number" id="dieselStock" class="form-control" placeholder="Enter stock amount" min="0">
                </div>
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="dieselAvailability">
                    <label class="form-check-label" for="dieselAvailability">Available</label>
                </div>

                <button type="button" id="saveButton">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        async function loadStockData() {
            try {
                const response = await fetch('/api/stock');
                const stockData = await response.json();

                document.getElementById('ron95Stock').value = stockData['Ron 95'].stock_left;
                document.getElementById('ron95Availability').checked = stockData['Ron 95'].availability === 'Yes';

                document.getElementById('ron97Stock').value = stockData['Ron 97'].stock_left;
                document.getElementById('ron97Availability').checked = stockData['Ron 97'].availability === 'Yes';

                document.getElementById('dieselStock').value = stockData['Diesel'].stock_left;
                document.getElementById('dieselAvailability').checked = stockData['Diesel'].availability === 'Yes';
            } catch (error) {
                console.error("Error loading stock data:", error);
                alert("Failed to load stock data. Please try again.");
            }
        }

        document.getElementById('saveButton').addEventListener('click', async () => {
            const updatedStockData = {
                'Ron 95': {
                    stock_left: parseInt(document.getElementById('ron95Stock').value, 10),
                    availability: document.getElementById('ron95Availability').checked ? 'Yes' : 'No'
                },
                'Ron 97': {
                    stock_left: parseInt(document.getElementById('ron97Stock').value, 10),
                    availability: document.getElementById('ron97Availability').checked ? 'Yes' : 'No'
                },
                'Diesel': {
                    stock_left: parseInt(document.getElementById('dieselStock').value, 10),
                    availability: document.getElementById('dieselAvailability').checked ? 'Yes' : 'No'
                }
            };

            try {
                const response = await fetch('/api/stock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedStockData)
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                alert('Stock data has been updated successfully!');
            } catch (error) {
                console.error("Error updating stock data:", error);
                alert("Failed to update stock data. Please try again.");
            }
        });

        loadStockData();
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>

</html>
